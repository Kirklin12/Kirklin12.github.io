name: Generate IPTV EPG

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch:        # manual run button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clone IPTV-org EPG tool
        run: git clone https://github.com/iptv-org/epg.git

      - name: Install dependencies
        run: |
          cd epg
          npm install

      - name: Generate EPG
  run: |
    cd epg
    node scripts/commands/epg/grab.js --site=tvtv.us --lang=en --output=../guide.xml

      - name: Commit and push guide.xml
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add guide.xml
          git commit -m "auto update EPG" || exit 0
          git push
