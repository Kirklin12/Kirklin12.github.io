name: IPTV Auto EPG Pipeline

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install xml2js axios fs-extra

      - name: Clone IPTV database
        run: git clone https://github.com/iptv-org/database.git

      - name: Build EPG + Match channels
        run: node scripts/build.js

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add guide.xml master-clean.m3u
          git commit -m "auto update IPTV EPG" || exit 0
          git push
